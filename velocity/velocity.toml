# =============================================================================
# velocity.toml – Velocity Proxy Configuration
# =============================================================================
# Velocity acts as a protective front-end proxy for the two Minecraft nodes.
# Players always connect to the Velocity IP/domain; Velocity routes them to
# the active backend and automatically falls back to the backup if primary
# is unreachable.
#
# Documentation: https://docs.papermc.io/velocity/configuration
# =============================================================================

# The port Velocity listens on (players connect here)
bind = "0.0.0.0:25577"

# Motd shown in the server list
motd = "&6GameServer &7– &aHochverfügbar &r| &bHA-Setup"

# Maximum players shown in the server list (-1 = unlimited)
show_max_players = 500

# Set to false because backends run in offline mode (Velocity handles auth)
online_mode = true

# Use MODERN forwarding with Paper backends
player_info_forwarding_mode = "MODERN"

# Forwarding secret – must match PAPER_VELOCITY_SECRET in docker-compose files
# Generate with: openssl rand -hex 16
forwarding_secret = "CHANGE_ME_SECRET_HERE"

# Kick existing player if a new connection uses the same UUID
kick_existing_players = false

# ── Servers ──────────────────────────────────────────────────────────────────
[servers]
# Primary Minecraft node (Node A)
main   = "192.168.1.10:25565"   # ← replace with real IP of Node A
# Backup Minecraft node (Node B)
backup = "192.168.1.11:25565"   # ← replace with real IP of Node B

# The order determines the connection attempt sequence.
# Players are sent to "main" first; if it times out they are routed to "backup".
try = ["main", "backup"]

# ── Forced Hosts ──────────────────────────────────────────────────────────────
[forced-hosts]
# Players connecting via this hostname are always routed to the main/backup list
"play.yourdomain.de" = ["main", "backup"]   # ← set your domain

# ── Advanced ─────────────────────────────────────────────────────────────────
[advanced]
# How long (ms) Velocity waits for a backend to respond before trying the next
connection_timeout = 5000
# How long (ms) Velocity waits for a read from a backend
read_timeout       = 30000
# Compress packets larger than this many bytes (-1 = use client default)
compression_threshold  = 256
compression_level      = -1
# Limit login requests to reduce brute-force risk
login_ratelimit = 2000

# ── Query (Minecraft server-list protocol) ────────────────────────────────────
[query]
enabled     = true
port        = 25577
map         = "Velocity"
show_plugins = false
