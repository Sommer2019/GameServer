# Server
server.port=8080
# Graceful shutdown: finish in-flight requests before pod is terminated
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── Database ──────────────────────────────────────────────────────────────────
# Default: PostgreSQL (production / Kubernetes).
# Override DB_URL / DB_USER / DB_PASSWORD via environment variables.
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/gameserver}
spring.datasource.username=${DB_USER:gameserver}
spring.datasource.password=${DB_PASSWORD:gameserver}
spring.jpa.hibernate.ddl-auto=update

# ── Actuator – liveness & readiness probes for Kubernetes ─────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# ── JWT ───────────────────────────────────────────────────────────────────────
# Override JWT_SECRET with a strong random value in production!
app.jwt.secret=${JWT_SECRET:change-me-in-production-min-32-chars-long}
app.jwt.expiration-ms=86400000

# ── Orchestration ─────────────────────────────────────────────────────────────
# "kubernetes"  – game servers run as K8s Deployments in the same cluster (production)
# "docker"      – game servers run as Docker containers on the same host (local dev)
app.orchestration=${APP_ORCHESTRATION:kubernetes}

# Port range for game servers.
# Kubernetes NodePort: 30565-30574  |  Docker host port: 25565-25574
app.server.port-range-start=${PORT_RANGE_START:30565}
app.server.port-range-end=${PORT_RANGE_END:30574}

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.gameserver=INFO
