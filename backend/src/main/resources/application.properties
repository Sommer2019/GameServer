# Server
server.port=8080

# Database (H2 file-based so data survives restarts)
spring.datasource.url=jdbc:h2:file:/data/gameserver;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=false

# JWT – override via environment variable JWT_SECRET in production
app.jwt.secret=${JWT_SECRET:change-me-in-production-min-32-chars-long}
app.jwt.expiration-ms=86400000

# Docker socket (mounted from host)
docker.host=${DOCKER_HOST:unix:///var/run/docker.sock}

# Logging
logging.level.com.gameserver=INFO
