version: "3.9"

# ============================================================
# Node B – BACKUP (Passive / Hot-Standby) Minecraft + Velocity Proxy 2
# ============================================================
# This node runs TWO services:
#   1. minecraft-backup  – the standby Minecraft backend (watchdog-controlled)
#   2. velocity-proxy-2  – standby Velocity proxy (always running)
#
# Keepalived on this host takes the public Proxy VIP only when Node A fails.
# The Velocity proxy on Node B is always running but receives traffic ONLY
# when the VIP has failed over here.
#
# Prerequisites:
#   - Shared NFS volume is already mounted at /mnt/gamedata on this host
#   - Keepalived is running (see keepalived/node-b/keepalived.conf)
#
# Usage:
#   docker compose -f docker-compose-node-b.yml up -d
# ============================================================

services:

  # ── 1. Minecraft Backend (backup / passive) ───────────────────────────────
  minecraft-backup:
    image: itzg/minecraft-server:latest
    container_name: minecraft-backup
    restart: unless-stopped
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "1.21.4"
      MEMORY: "4G"
      ONLINE_MODE: "FALSE"
      ENFORCE_SECURE_PROFILE: "FALSE"
      PAPER_VELOCITY_SECRET: "${VELOCITY_SECRET}"
      JVM_XX_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200"
      # Signal to the entrypoint that this is the standby node
      STANDBY_MODE: "true"
    volumes:
      # Same shared NFS mount as Node A – session.lock prevents dual-write
      - /mnt/gamedata/worlds:/data/worlds
      - minecraft-config-backup:/data
      # Mount watchdog script into container
      - ./scripts/watchdog.sh:/usr/local/bin/watchdog.sh:ro
      - ./scripts/entrypoint-backup.sh:/usr/local/bin/entrypoint-backup.sh:ro
    ports:
      # Bind only to localhost so only the co-located proxy can reach it
      - "127.0.0.1:25565:25565"
    # Override default entrypoint to run the watchdog-controlled startup
    entrypoint: ["/bin/bash", "/usr/local/bin/entrypoint-backup.sh"]
    networks:
      - gameserver-net
    healthcheck:
      test: ["CMD-SHELL", "[ -f /tmp/minecraft-active ] && mc-health || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      role: "backup"
      node: "node-b"

  # ── 2. Velocity Proxy (instance 2 – lives on Node B) ─────────────────────
  # Always running, but receives player traffic only when this node holds
  # the Proxy VIP (i.e., after a failover from Node A).
  velocity-proxy-2:
    build:
      context: ./velocity
      dockerfile: Dockerfile
    image: gameserver-velocity:latest
    container_name: velocity-proxy-2
    restart: unless-stopped
    ports:
      # Same public port – Keepalived Proxy VIP will route here after failover
      - "25565:25577"
    volumes:
      - ./velocity/velocity.toml:/opt/velocity/velocity.toml:ro
      - velocity-data-2:/opt/velocity
    networks:
      - gameserver-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 25577 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      role: "proxy"
      node: "node-b"

volumes:
  minecraft-config-backup:
    driver: local
  velocity-data-2:
    driver: local

networks:
  gameserver-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
