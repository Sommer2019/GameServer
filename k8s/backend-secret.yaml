# ── Backend Secrets ────────────────────────────────────────────────────────────
# IMPORTANT: Replace these values before deploying to production.
# Minimum JWT_SECRET length: 32 characters.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: gameserver
type: Opaque
stringData:
  JWT_SECRET:   "change-me-in-production-min-32-chars-long"
  DB_PASSWORD:  "change-me-in-production"
