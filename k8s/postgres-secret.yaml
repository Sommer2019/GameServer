# ── PostgreSQL credentials ─────────────────────────────────────────────────────
# IMPORTANT: Replace the values with strong secrets before deploying to production.
# Use a secrets manager (Vault, Sealed Secrets, External Secrets Operator) in production.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: gameserver
type: Opaque
stringData:
  POSTGRES_DB:       gameserver
  POSTGRES_USER:     gameserver
  # CHANGE THIS before deploying to production!
  POSTGRES_PASSWORD: "change-me-in-production"
