# ── Backend Deployment ─────────────────────────────────────────────────────────
# 2 replicas + pod anti-affinity → no single-node SPOF.
# Rolling update strategy → zero downtime on redeploy.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: gameserver
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # no pod is taken down until the new one is ready (zero-downtime rollout)
      maxSurge: 1
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: gameserver-backend
      # Spread replicas across different nodes to eliminate single-node failures
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: backend
                topologyKey: kubernetes.io/hostname
      containers:
        - name: backend
          image: gameserver-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: APP_ORCHESTRATION
              value: "kubernetes"
            - name: PORT_RANGE_START
              value: "30565"
            - name: PORT_RANGE_END
              value: "30574"
            - name: DB_URL
              value: "jdbc:postgresql://postgres.gameserver.svc.cluster.local:5432/gameserver"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: JWT_SECRET
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          # Spring Boot Actuator probes
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          # Allow in-flight requests to finish before the pod is terminated
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
      terminationGracePeriodSeconds: 60
