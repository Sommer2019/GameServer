version: "3.9"

# ============================================================
# IPv4 Lab – Node A (MASTER)
# ============================================================
# Start with:
#   docker compose -f test/ipv4-lab/compose/node-a.yml --env-file test/ipv4-lab/.env up -d
# ============================================================

services:
  minecraft-lobby:
    image: itzg/minecraft-server:latest
    container_name: minecraft-lobby
    restart: unless-stopped
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "${MC_VERSION:-1.21.4}"
      MEMORY: "512M"
      ONLINE_MODE: "FALSE"
      ENFORCE_SECURE_PROFILE: "FALSE"
      PAPER_VELOCITY_SECRET: "${VELOCITY_SECRET}"
      GAMEMODE: "adventure"
      FORCE_GAMEMODE: "TRUE"
      JVM_XX_OPTS: "-XX:+UseG1GC"
    volumes:
      - lobby-config:/data
    # Kein Host-Port nötig – Velocity erreicht den Lobby-Server
    # intern über den Docker-Service-Namen "minecraft-lobby:25565"
    networks:
      - gameserver-net
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  minecraft-primary:
    image: itzg/minecraft-server:latest
    container_name: minecraft-primary
    restart: unless-stopped
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "${MC_VERSION:-1.21.4}"
      MEMORY: "${MC_MEMORY:-2G}"
      ONLINE_MODE: "FALSE"
      ENFORCE_SECURE_PROFILE: "FALSE"
      PAPER_VELOCITY_SECRET: "${VELOCITY_SECRET}"
      JVM_XX_OPTS: "-XX:+UseG1GC -XX:+ParallelRefProcEnabled -XX:MaxGCPauseMillis=200"
    volumes:
      - /mnt/gamedata/worlds:/data/worlds
      - minecraft-config:/data
    ports:
      # Port 25575 statt 25565 – vermeidet Konflikt mit Velocity (0.0.0.0:25565).
      # Velocity auf Node A erreicht diesen Server intern als "minecraft-primary:25565".
      # Node B's Velocity nutzt ihn als Backup über 172.29.80.10:25575.
      - "0.0.0.0:25575:25565"
    networks:
      - gameserver-net
    healthcheck:
      test: ["CMD", "mc-health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  velocity-proxy-1:
    build:
      context: ../velocity
      dockerfile: Dockerfile
    image: gameserver-velocity-ipv4-lab:latest
    container_name: velocity-proxy-1
    restart: unless-stopped
    depends_on:
      - minecraft-primary
      - minecraft-lobby
    ports:
      - "0.0.0.0:25565:25577"
    volumes:
      - ../velocity/velocity-node-a.toml:/opt/velocity/velocity.toml:ro
      - velocity-data-1:/opt/velocity
    networks:
      - gameserver-net
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 25577 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  lobby-config:
    driver: local
  minecraft-config:
    driver: local
  velocity-data-1:
    driver: local

networks:
  gameserver-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1

