# =============================================================================
# IPv4 Lab – keepalived.conf for Node A (MASTER)
# =============================================================================
# Copy to /etc/keepalived/keepalived.conf on PC 1.
# Adjust interface, auth_pass and VIP before enabling keepalived.
# =============================================================================

global_defs {
    router_id IPV4_LAB_NODE_A
    script_user root
    enable_script_security
}

vrrp_script chk_velocity {
    script "/etc/keepalived/check_velocity.sh"
    interval 5
    weight  -30
    fall    2
    rise    3
}

vrrp_script chk_minecraft {
    script "/etc/keepalived/check_minecraft.sh"
    interval 5
    weight  -10
    fall    2
    rise    3
}

vrrp_instance PROXY_VIP {
    state  MASTER
    interface eth0

    virtual_router_id 51
    priority 110

    advert_int 1

    authentication {
        auth_type PASS
        auth_pass labpass1
    }

    virtual_ipaddress {
        172.29.80.200/24
    }

    track_script {
        chk_velocity
        chk_minecraft
    }

    notify_master  "/etc/keepalived/notify.sh MASTER"
    notify_backup  "/etc/keepalived/notify.sh BACKUP"
    notify_fault   "/etc/keepalived/notify.sh FAULT"
}

