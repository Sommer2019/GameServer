version: "3.9"

services:
  # ── Reverse proxy ────────────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      - web

  # ── React + Vite frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - web

  # ── Java Spring Boot backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      # Use Docker orchestration in local dev (game servers = containers on this host)
      APP_ORCHESTRATION: docker
      PORT_RANGE_START: 25565
      PORT_RANGE_END: 25574
      # Docker socket so the backend can create Minecraft containers on the same host
      DOCKER_HOST: unix:///var/run/docker.sock
      # PostgreSQL connection (matches the postgres service below)
      DB_URL: jdbc:postgresql://postgres:5432/gameserver
      DB_USER: gameserver
      DB_PASSWORD: ${DB_PASSWORD:-gameserver_dev}
      # Override this with a strong random secret in production!
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-long}
    volumes:
      # Mount Docker socket for Minecraft container management
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - web
    expose:
      - "8080"

  # ── PostgreSQL database ───────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gameserver
      POSTGRES_USER: gameserver
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gameserver_dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gameserver"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - web

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres-data:

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  web:
    driver: bridge
