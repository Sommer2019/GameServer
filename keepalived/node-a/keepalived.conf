# =============================================================================
# keepalived.conf – Node A (MASTER / PRIMARY)
# =============================================================================
# Install keepalived on Node A and Node B (not inside Docker):
#   sudo apt-get install keepalived
#
# Copy this file to /etc/keepalived/keepalived.conf on Node A.
# Adjust the following values before deploying:
#   INTERFACE   – network interface that holds the VIP (e.g. eth0, ens3)
#   VIP         – the shared Virtual IP address (e.g. 192.168.1.100)
#   NODE_A_IP   – real IP of Node A
#   NODE_B_IP   – real IP of Node B
#   AUTH_PASS   – shared secret between the two nodes (keep private!)
# =============================================================================

global_defs {
    router_id GAMESERVER_NODE_A
    script_user root
    enable_script_security
}

# ── Health-check script ───────────────────────────────────────────────────────
# Returns 0 if the local Minecraft container is healthy, 1 otherwise.
vrrp_script chk_minecraft {
    script "/etc/keepalived/check_minecraft.sh"
    interval 5       # run every 5 seconds
    weight  -20      # subtract 20 from priority when check fails
    fall    2        # require 2 consecutive failures before declaring DOWN
    rise    3        # require 3 consecutive successes before declaring UP
}

# ── VRRP Instance ─────────────────────────────────────────────────────────────
vrrp_instance GAMESERVER_VIP {
    state  MASTER          # Node A starts as MASTER
    interface eth0         # ← adjust to your network interface

    virtual_router_id 51   # must be the same on both nodes (1–255)
    priority 110           # Node A: 110  |  Node B: 100  (higher = preferred)

    advert_int 1           # VRRP advertisement interval in seconds

    authentication {
        auth_type PASS
        auth_pass CHANGE_ME_SECRET   # ← set a strong shared password
    }

    virtual_ipaddress {
        192.168.1.100/24   # ← set your desired Virtual IP here
    }

    track_script {
        chk_minecraft
    }

    # Optional: notify scripts triggered on state changes
    notify_master  "/etc/keepalived/notify.sh MASTER"
    notify_backup  "/etc/keepalived/notify.sh BACKUP"
    notify_fault   "/etc/keepalived/notify.sh FAULT"
}
