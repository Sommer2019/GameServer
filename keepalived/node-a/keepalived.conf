# =============================================================================
# keepalived.conf – Node A (MASTER / PRIMARY)
# =============================================================================
# Node A runs:  Minecraft Primary  +  Velocity Proxy 1
#
# Keepalived manages TWO Virtual IPs:
#   PROXY_VIP  – IPv4 VIP (VRRPv2) – 192.168.1.200
#   PROXY_VIP6 – IPv6 VIP (VRRPv3) – fd00::200
#
# This node is the preferred holder of both VIPs (higher priority: 110).
#
# Install keepalived on Node A and Node B (not inside Docker):
#   sudo apt-get install keepalived
#
# Copy this file to /etc/keepalived/keepalived.conf on Node A.
# Also copy:
#   keepalived/check_minecraft.sh  → /etc/keepalived/check_minecraft.sh
#   keepalived/check_velocity.sh   → /etc/keepalived/check_velocity.sh
#   keepalived/notify.sh           → /etc/keepalived/notify.sh
#
# Adjust before deploying:
#   interface  – network interface (e.g. eth0, ens3)
#   IPv4 VIP   – 192.168.1.200/24 (what your DNS A-record points to)
#   IPv6 VIP   – fd00::200/64     (what your DNS AAAA-record points to)
#   AUTH_PASS  – shared secret (IPv4 VRRP only; VRRPv3 has no auth)
# =============================================================================

global_defs {
    router_id GAMESERVER_NODE_A
    script_user root
    enable_script_security
}

# ── Health-check: Velocity Proxy ──────────────────────────────────────────────
vrrp_script chk_velocity {
    script "/etc/keepalived/check_velocity.sh"
    interval 5       # run every 5 seconds
    weight  -30      # subtract 30 from priority when proxy check fails
    fall    2        # 2 consecutive failures → declare DOWN
    rise    3        # 3 consecutive successes → declare UP
}

# ── Health-check: Minecraft Backend ──────────────────────────────────────────
vrrp_script chk_minecraft {
    script "/etc/keepalived/check_minecraft.sh"
    interval 5
    weight  -10
    fall    2
    rise    3
}

# ── VRRP Instance: Public IPv4 Proxy VIP (VRRPv2) ────────────────────────────
vrrp_instance PROXY_VIP {
    state  MASTER          # Node A starts as MASTER
    interface eth0         # ← adjust to your network interface

    virtual_router_id 51   # must be the same on both nodes (1–255, unique per VIP)
    priority 110           # Node A: 110  |  Node B: 100

    advert_int 1

    authentication {
        auth_type PASS
        auth_pass CHANGE_ME_SECRET   # ← set a strong shared password
    }

    virtual_ipaddress {
        192.168.1.200/24   # ← IPv4 Proxy VIP (adjust!)
    }

    track_script {
        chk_velocity
        chk_minecraft
    }

    notify_master  "/etc/keepalived/notify.sh MASTER"
    notify_backup  "/etc/keepalived/notify.sh BACKUP"
    notify_fault   "/etc/keepalived/notify.sh FAULT"
}

# ── VRRP Instance: Public IPv6 Proxy VIP (VRRPv3) ────────────────────────────
# VRRPv3 is required for IPv6. It does NOT support AUTH_PASS.
# virtual_router_id 52 must be unique and match Node B exactly.
vrrp_instance PROXY_VIP6 {
    state  MASTER
    interface eth0         # ← same interface as PROXY_VIP

    virtual_router_id 52   # ← different from PROXY_VIP's id (51)
    priority 110

    advert_int 1
    version 3              # VRRPv3 is mandatory for IPv6

    virtual_ipaddress {
        fd00::200/64       # ← IPv6 Proxy VIP (adjust!)
    }

    track_script {
        chk_velocity
        chk_minecraft
    }

    notify_master  "/etc/keepalived/notify.sh MASTER"
    notify_backup  "/etc/keepalived/notify.sh BACKUP"
    notify_fault   "/etc/keepalived/notify.sh FAULT"
}

