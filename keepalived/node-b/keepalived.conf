# =============================================================================
# keepalived.conf – Node B (BACKUP / HOT-STANDBY)
# =============================================================================
# Node B runs:  Minecraft Backup (watchdog-controlled)  +  Velocity Proxy 2
#
# This node takes the public Proxy VIP only when Node A is unavailable.
# Velocity Proxy 2 is always running but receives traffic only when the VIP
# has failed over to this node.
#
# Copy this file to /etc/keepalived/keepalived.conf on Node B.
# Also copy (same as Node A):
#   keepalived/check_minecraft.sh  → /etc/keepalived/check_minecraft.sh
#   keepalived/check_velocity.sh   → /etc/keepalived/check_velocity.sh
#   keepalived/notify.sh           → /etc/keepalived/notify.sh
#
# Adjust interface, VIP, and AUTH_PASS to match Node A's config exactly.
# =============================================================================

global_defs {
    router_id GAMESERVER_NODE_B
    script_user root
    enable_script_security
}

vrrp_script chk_velocity {
    script "/etc/keepalived/check_velocity.sh"
    interval 5
    weight  -30
    fall    2
    rise    3
}

vrrp_script chk_minecraft {
    script "/etc/keepalived/check_minecraft.sh"
    interval 5
    weight  -10
    fall    2
    rise    3
}

vrrp_instance PROXY_VIP {
    state  BACKUP          # Node B starts as BACKUP
    interface eth0         # ← adjust to your network interface

    virtual_router_id 51   # must match Node A exactly
    priority 100           # lower than Node A (110) so A is preferred

    advert_int 1

    authentication {
        auth_type PASS
        auth_pass CHANGE_ME_SECRET   # ← must match Node A exactly
    }

    virtual_ipaddress {
        192.168.1.200/24   # ← must match Node A exactly
    }

    track_script {
        chk_velocity
        chk_minecraft
    }

    notify_master  "/etc/keepalived/notify.sh MASTER"
    notify_backup  "/etc/keepalived/notify.sh BACKUP"
    notify_fault   "/etc/keepalived/notify.sh FAULT"
}

