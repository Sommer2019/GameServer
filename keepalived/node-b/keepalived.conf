# =============================================================================
# keepalived.conf – Node B (BACKUP / HOT-STANDBY)
# =============================================================================
# Copy this file to /etc/keepalived/keepalived.conf on Node B.
# Adjust INTERFACE, VIP, and AUTH_PASS to match Node A's config.
# =============================================================================

global_defs {
    router_id GAMESERVER_NODE_B
    script_user root
    enable_script_security
}

vrrp_script chk_minecraft {
    script "/etc/keepalived/check_minecraft.sh"
    interval 5
    weight  -20
    fall    2
    rise    3
}

vrrp_instance GAMESERVER_VIP {
    state  BACKUP          # Node B starts as BACKUP
    interface eth0         # ← adjust to your network interface

    virtual_router_id 51   # must match Node A
    priority 100           # lower than Node A (110) so A is preferred

    advert_int 1

    authentication {
        auth_type PASS
        auth_pass CHANGE_ME_SECRET   # ← must match Node A exactly
    }

    virtual_ipaddress {
        192.168.1.100/24   # ← must match Node A exactly
    }

    track_script {
        chk_minecraft
    }

    notify_master  "/etc/keepalived/notify.sh MASTER"
    notify_backup  "/etc/keepalived/notify.sh BACKUP"
    notify_fault   "/etc/keepalived/notify.sh FAULT"
}
